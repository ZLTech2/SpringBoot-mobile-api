spring.application.name=mobile-api
spring.datasource.url=jdbc:mysql://localhost:3306/negocio_na_area?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
server.port=8081
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*

# Uploads (local dev)
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# JWT (dev)
app.jwt.secret=change-me-to-a-long-random-secret-at-least-32-chars
app.jwt.issuer=mobile-api
app.jwt.ttl-seconds=3600

# Cupom de aniversario
# Percentual do desconto (10 = 10%)
app.cupom.aniversario.percentual=10
# Quantos dias o cupom fica valido apos ser emitido
app.cupom.aniversario.dias-validade=7
# Todo dia as 00:05
app.cupom.aniversario.cron=0 5 0 * * *
